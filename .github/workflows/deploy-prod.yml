name: Deploy Prod Telegram Bot to Server

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

concurrency:
  group: djgurda-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute lowercase repository names
        id: repo_meta
        shell: bash
        run: |
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Validate release sync (when tag exists on HEAD)
        run: |
          HEAD_TAG="$(git tag --points-at HEAD | head -n1 || true)"
          if [ -z "$HEAD_TAG" ]; then
            echo "No tag on HEAD. Skip strict release sync check."
          else
            echo "Release tag on HEAD: $HEAD_TAG"
            python scripts/release_sync.py --tag "$HEAD_TAG"
          fi

      - name: Generate version
        id: version
        run: |
          HEAD_TAG="$(git tag --points-at HEAD | head -n1 || true)"
          if [ -n "$HEAD_TAG" ]; then
            VERSION="$HEAD_TAG"
          else
            VERSION="$(python -c 'from src import __version__; print(__version__)')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.repo_meta.outputs.owner_lc }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_meta.outputs.repo_lc }}:latest
            ghcr.io/${{ steps.repo_meta.outputs.repo_lc }}:prod-${{ github.sha }}
          platforms: linux/amd64

      - name: Copy deploy/manager.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          source: "deploy/manager.sh"
          target: "/home/${{ secrets.SSH_USER }}/"
          overwrite: true
          strip_components: 0

      - name: Deploy to server via SSH (port 228)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          script: |
            BOT_ROOT="/home/${{ secrets.SSH_USER }}/bot_prod"
            mkdir -p "$BOT_ROOT"
            cd "$BOT_ROOT"

            echo "ADMIN_ID=${{ secrets.ADMIN_ID }}" > .env
            echo "BOT_VERSION=${{ steps.version.outputs.VERSION }}" >> .env
            echo "BOT_DB_PATH=/app/src/data/db/bot.db" >> .env
            echo "COOKIES_DIR=/app/src/data/cookies" >> .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN_PROD }}" >> .env
            echo "YANDEX_MUSIC_TOKEN=${{ secrets.YANDEX_MUSIC_TOKEN }}" >> .env

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ steps.repo_meta.outputs.owner_lc }} --password-stdin
            docker pull ghcr.io/${{ steps.repo_meta.outputs.repo_lc }}:latest

            chmod +x /home/${{ secrets.SSH_USER }}/deploy/manager.sh
            /home/${{ secrets.SSH_USER }}/deploy/manager.sh prod
