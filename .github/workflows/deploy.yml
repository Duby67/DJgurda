name: Deploy Telegram Bot to Server

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase repository names
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Generate version
        id: version
        run: |
          TAG=$(git describe --tags --exact-match 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            SHORT_HASH=$(git rev-parse --short HEAD)
            DATE=$(date +'%Y-%m-%d')
            VERSION="${SHORT_HASH} от ${DATE}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Copy manager.sh to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          source: "manager.sh"
          target: "/home/${{ secrets.SSH_USER }}/"
          overwrite: true
          strip_components: 0

      - name: Deploy to server via SSH (port 228)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          script: |
            chmod +x /home/${{ secrets.SSH_USER }}/manager.sh
            cd /home/${{ secrets.SSH_USER }}/bot
            
            echo "ADMIN_ID=${{ secrets.ADMIN_ID }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "YANDEX_MUSIC_TOKEN=${{ secrets.YANDEX_MUSIC_TOKEN }}" >> .env
            echo "YOUTUBE_COOKIES_PATH=${{ secrets.YOUTUBE_COOKIES_PATH }}" >> .env
            echo "BOT_VERSION=${{ steps.version.outputs.VERSION }}" >> .env

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ env.OWNER_LC }} --password-stdin
            docker pull ghcr.io/${{ env.REPO_LC }}:latest

            /home/${{ secrets.SSH_USER }}/manager.sh
            docker system prune -f