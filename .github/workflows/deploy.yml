name: Deploy Telegram Bot to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase repository names
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.OWNER_LC }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Deploy to server via SSH (port 228)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }} 
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          script: |
            cd /home/${{ secrets.SSH_USER }}/bot

            # Создаём .env из секретов
            echo "ADMIN_ID=${{ secrets.ADMIN_ID }}" > .env
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
            echo "YANDEX_MUSIC_TOKEN=${{ secrets.YANDEX_MUSIC_TOKEN }}" >> .env
            echo "YOUTUBE_COOKIES=${{ secrets.YOUTUBE_COOKIES }}" >> .env

            # Логинимся в GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ env.OWNER_LC }} --password-stdin

            # Скачиваем новый образ
            docker pull ghcr.io/${{ env.REPO_LC }}:latest

            # Останавливаем и удаляем старый контейнер
            docker stop telegram-bot || true
            docker rm telegram-bot || true

            # Запускаем контейнер
            docker run -d \
              --name telegram-bot \
              --restart always \
              --env-file .env \
              ghcr.io/${{ env.REPO_LC }}:latest

            # Очистка
            docker system prune -f