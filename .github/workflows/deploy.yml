name: Deploy Telegram Bot to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ toLower(github.repository) }}:latest
            ghcr.io/${{ toLower(github.repository) }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 228
          script: |
            cd /home/${{ secrets.SSH_USER }}/bot

            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
            echo "API_KEY=${{ secrets.API_KEY }}" >> .env

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            docker stop telegram-bot || true
            docker rm telegram-bot || true

            docker pull ghcr.io/${{ toLower(github.repository) }}:latest

            docker run -d \
              --name telegram-bot \
              --restart always \
              --env-file .env \
              ghcr.io/${{ toLower(github.repository) }}:latest

            docker system prune -f